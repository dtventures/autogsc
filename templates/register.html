<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoGSC - Create Account</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
        }

        .register-container {
            text-align: center;
            max-width: 400px;
            width: 100%;
            padding: 3rem 2rem;
        }

        .logo {
            font-size: 3rem;
            margin-bottom: 0.75rem;
        }

        h1 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 0.4rem;
        }

        .tagline {
            color: rgba(255, 255, 255, 0.55);
            font-size: 1rem;
            margin-bottom: 2rem;
        }

        .register-form {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            text-align: left;
        }

        .register-form input {
            width: 100%;
            padding: 12px 16px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            background: rgba(255, 255, 255, 0.07);
            color: #fff;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .register-form input:focus {
            border-color: rgba(255, 255, 255, 0.4);
        }

        .register-form input::placeholder {
            color: rgba(255, 255, 255, 0.35);
        }

        .register-btn {
            width: 100%;
            padding: 12px;
            border-radius: 50px;
            border: none;
            background: #4f46e5;
            color: #fff;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 20px rgba(79, 70, 229, 0.4);
            margin-top: 0.25rem;
        }

        .register-btn:hover {
            background: #4338ca;
            transform: translateY(-1px);
        }

        .error-msg {
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid rgba(239, 68, 68, 0.4);
            color: #fca5a5;
            padding: 0.75rem 1rem;
            border-radius: 8px;
            font-size: 0.9rem;
            text-align: left;
        }

        .signin-link {
            margin-top: 1.25rem;
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.5);
        }

        .signin-link a {
            color: rgba(255, 255, 255, 0.85);
            text-decoration: underline;
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin: 1.5rem 0;
            color: rgba(255, 255, 255, 0.4);
            font-size: 0.9rem;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(255, 255, 255, 0.15);
        }

        .google-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 100%;
            background: #fff;
            color: #333;
            padding: 12px 24px;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 500;
            text-decoration: none;
            transition: all 0.2s;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        .google-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.4);
        }

        .google-btn svg {
            width: 20px;
            height: 20px;
        }
    </style>
</head>

<body>
    <div class="register-container">
        <div class="logo">🚀</div>
        <h1>AutoGSC</h1>
        <p class="tagline">Create your account</p>

        {% if error %}
        <div class="error-msg" style="margin-bottom: 1rem;">{{ error }}</div>
        {% endif %}

        <form class="register-form" method="POST" action="/register">
            <input type="text" name="name" placeholder="Full name (optional)"
                   value="{{ name or '' }}" autocomplete="name">
            <input type="email" name="email" placeholder="Email address" required
                   value="{{ email or '' }}" autocomplete="email">
            <input type="password" name="password" placeholder="Password (min 6 characters)" required
                   autocomplete="new-password">
            <input type="password" name="confirm_password" placeholder="Confirm password" required
                   autocomplete="new-password">
            <button type="submit" class="register-btn">Create Account</button>
        </form>

        <div class="divider">or</div>

        <a href="/auth/google" class="google-btn">
            <svg viewBox="0 0 24 24">
                <path fill="#4285F4"
                    d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" />
                <path fill="#34A853"
                    d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" />
                <path fill="#FBBC05"
                    d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" />
                <path fill="#EA4335"
                    d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" />
            </svg>
            Sign up with Google
        </a>

        <p class="signin-link">Already have an account? <a href="/login">Sign in</a></p>
    </div>
</body>

</html>
